name: fintrack
description: A complete Flutter Android app called FinTrack.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  fl_chart: ^0.66.0
  google_fonts: ^6.2.1
  uuid: ^4.5.3
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  cloud_functions: ^6.3.3
  firebase_messaging: ^16.4.1
  http: ^1.6.0
  permission_handler: ^12.0.3
  google_sign_in: ^7.2.0
  geolocator: ^14.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/merchant_dictionary.json
